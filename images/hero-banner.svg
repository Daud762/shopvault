<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6584" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background Glow -->
  <circle cx="300" cy="250" r="200" fill="url(#g1)" />
  
  <!-- Floating Dashboard UI representation -->
  <g transform="translate(100, 50)">
    <!-- Main Window -->
    <rect x="0" y="0" width="400" height="300" rx="20" fill="#ffffff" filter="drop-shadow(0 20px 40px rgba(0,0,0,0.15))"/>
    
    <!-- Sidebar -->
    <rect x="0" y="0" width="80" height="300" rx="20" fill="#F3F4F6"/>
    <circle cx="40" cy="40" r="15" fill="#6C63FF" opacity="0.2"/>
    <rect x="25" y="80" width="30" height="4" rx="2" fill="#6C63FF"/>
    <rect x="25" y="100" width="30" height="4" rx="2" fill="#D1D5DB"/>
    <rect x="25" y="120" width="30" height="4" rx="2" fill="#D1D5DB"/>
    <rect x="25" y="140" width="30" height="4" rx="2" fill="#D1D5DB"/>
    
    <!-- Charts & Cards Area -->
    <rect x="100" y="20" width="140" height="80" rx="12" fill="#F9FAFB"/>
    <rect x="100" y="50" width="40" height="30" rx="6" fill="#6C63FF" opacity="0.2"/>
    <circle cx="210" cy="30" r="15" fill="#FF6584" opacity="0.8"/>
    <circle cx="220" cy="30" r="15" fill="#6C63FF" opacity="0.8"/>
    
    <rect x="260" y="20" width="120" height="80" rx="12" fill="#F9FAFB"/>
    <text x="280" y="40" font-family="Arial" font-size="12" fill="#6B7280">Sales</text>
    <text x="280" y="60" font-family="Arial" font-size="18" font-weight="bold" fill="#1A1A2E">$12k</text>
    
    <rect x="100" y="120" width="280" height="160" rx="12" fill="#F9FAFB"/>
    <rect x="120" y="140" width="240" height="60" rx="8" fill="url(#g1)" />
    <text x="120" y="220" font-family="Arial" font-size="12" fill="#6B7280">Analytics</text>
    
    <!-- Floating Items -->
    <g transform="translate(-40, -20)">
      <rect x="0" y="0" width="60" height="60" rx="12" fill="#ffffff" filter="drop-shadow(0 10px 20px rgba(0,0,0,0.1))"/>
      <circle cx="30" cy="30" r="15" fill="#FF6584"/>
    </g>
  </g>
</svg>